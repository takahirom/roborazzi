name: Dependency Diff Report

on: pull_request

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/setup-java@0ab4596768b603586c0de567f2430c30f5b0d2b0 # v3.13.0
        with:
          distribution: 'zulu'
          java-version: 19
      - name: DEBUG fetch diagnostics (temporary)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          echo "=== git/gh versions ==="; git --version; gh --version | head -1
          echo "=== replicate action: gh repo clone --no-checkout ==="
          gh repo clone "${{ github.repository }}" sources -- --depth 1 --no-checkout; echo "ghClone exit=$?"
          cd sources
          echo "=== git config BEFORE manual extraheader ==="
          git config --local --list
          echo "=== extraheader values gh already set (count) ==="
          git config --local --get-all 'http.https://github.com/.extraheader' | wc -l
          echo "=== add action's extraheader (as the action does) ==="
          git config --local 'http.https://github.com/.extraheader' "AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)"
          echo "=== extraheader values AFTER (count) ==="
          git config --local --get-all 'http.https://github.com/.extraheader' | wc -l
          echo "=== fetch refs/pull/N/merge (stderr VISIBLE) ==="
          git fetch --depth 1 origin "refs/pull/${{ github.event.number }}/merge"; echo "mergeRef exit=$?"
      - name: Generate dependency diff report for library
        uses: yumemi-inc/gradle-dependency-diff-report@v2
        id: report-library
        with:
          # Pin head-ref to the PR merge ref. The action defaults head-ref to github.sha
          # (the PR merge commit) and fetches it by bare SHA, which the Actions GITHUB_TOKEN
          # cannot fetch because that commit is only on the unadvertised refs/pull/N/merge.
          # Fetching by ref name works. See https://github.com/yumemi-inc/gradle-dependency-diff-report
          head-ref: refs/pull/${{ github.event.number }}/merge
          configuration: 'releaseRuntimeClasspath'
          modules: |
            roborazzi-compose-ios|commonMainImplementationDependenciesMetadata
            roborazzi-compose-ios|iosArm64CompilationApi
            roborazzi-compose-ios|iosArm64CompileKlibraries
            roborazzi-compose-desktop|commonMainImplementationDependenciesMetadata
            roborazzi-ai-gemini|commonMainImplementationDependenciesMetadata
            roborazzi-ai-gemini|jvmRuntimeClasspath
            roborazzi-ai-gemini|releaseRuntimeClasspath
            roborazzi-ai-openai|commonMainImplementationDependenciesMetadata
            roborazzi-ai-openai|jvmRuntimeClasspath
            roborazzi-ai-openai|releaseRuntimeClasspath
            roborazzi-painter|commonMainImplementationDependenciesMetadata
            roborazzi-painter|jvmRuntimeClasspath
            roborazzi
            roborazzi-annotations
            roborazzi-junit-rule
            roborazzi-compose
            roborazzi-compose-preview-scanner-support

      - name: Save report-library outputs
        run: |
          mkdir -p outputs
          echo "exists-diff=${{ steps.report-library.outputs.exists-diff }}" > outputs/report-library.txt

      - name: Generate dependency diff report for plugin
        uses: yumemi-inc/gradle-dependency-diff-report@v2
        id: report-plugin
        with:
          # See report-library above for why head-ref is pinned to the PR merge ref.
          head-ref: refs/pull/${{ github.event.number }}/merge
          modules: |
            roborazzi-core|commonMainImplementationDependenciesMetadata
            roborazzi-core|jvmRuntimeClasspath
            roborazzi-core|releaseRuntimeClasspath
            roborazzi-gradle-plugin
          configuration: 'runtimeClasspath'
          project-dir: 'include-build'

      - name: Save report-plugin outputs
        run: |
          echo "exists-diff=${{ steps.report-plugin.outputs.exists-diff }}" > outputs/report-plugin.txt

      - name: Save PR number
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          mkdir -p pr
          echo ${{ github.event.number }} > pr/NR

      - name: Upload Dependency Diff Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dependency-diff
          path: outputs/
          retention-days: 30

      - name: Upload PR Number Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pr
          path: pr/
          retention-days: 30